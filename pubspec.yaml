name: daily_giants
description: "데일리 자이언츠 - 롯데 자이언츠 팬 앱"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  dio: ^5.4.3+1
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  table_calendar: ^3.1.1
  just_audio: ^0.9.37
  shimmer: ^3.0.0
  flutter_html: ^3.0.0-beta.2
  google_fonts: ^6.2.1
  url_launcher: ^6.2.6
  html: ^0.15.4
  google_mobile_ads: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
