  <rect x="70" y="42" width="16" height="12" rx="4" fill="#C8102E"/>
  <circle cx="50" cy="47" r="3" fill="#FFFFFF"/>
  <circle cx="78" cy="47" r="3" fill="#FFFFFF"/>
  <!-- Mouth -->
  <rect x="48" y="62" width="32" height="6" rx="3" fill="#AAAAAA"/>
  <rect x="52" y="63" width="6" height="4" rx="1" fill="#C8102E"/>
  <rect x="61" y="63" width="6" height="4" rx="1" fill="#C8102E"/>
  <rect x="70" y="63" width="6" height="4" rx="1" fill="#C8102E"/>
